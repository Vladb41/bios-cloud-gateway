<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>🔐 BIOS Cloud Gateway</title>
<style>:root{--bg:#0d1117;--surf:#161b22;--brd:#30363d;--txt:#e6edf3;--mut:#8b949e;--acc:#58a6ff;--u:#1f6feb;--a:#21262d;--ok:#3fb950;--err:#f85149}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}header{padding:1rem;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;background:var(--surf)}header h1{font-size:1.1rem;font-weight:600}#clear{background:transparent;border:1px solid var(--brd);color:var(--mut);padding:.4rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem}#clear:hover{background:var(--brd);color:var(--txt)}#chat{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem}.msg{max-width:85%;padding:.8rem 1rem;border-radius:12px;line-height:1.5;position:relative}.msg.user{align-self:flex-end;background:var(--u);color:#fff;border-bottom-right-radius:4px}.msg.ai{align-self:flex-start;background:var(--a);border:1px solid var(--brd);border-bottom-left-radius:4px}.meta{font-size:.75rem;color:var(--mut);margin-bottom:.4rem;display:flex;gap:.4rem;flex-wrap:wrap}.meta span{background:rgba(255,255,255,.1);padding:.1rem .3rem;border-radius:4px}.content{white-space:pre-wrap;word-wrap:break-word}#input-box{padding:1rem;background:var(--surf);border-top:1px solid var(--brd)}.controls{display:flex;gap:1rem;margin-bottom:.8rem;align-items:center}.toggle{display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--mut);cursor:pointer}.toggle input{accent-color:var(--acc)}.wrap{display:flex;gap:.5rem;background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:.5rem;transition:border .2s}.wrap:focus-within{border-color:var(--acc)}textarea{flex:1;background:transparent;border:none;color:var(--txt);font-size:.95rem;padding:.5rem;resize:none;outline:none;font-family:inherit;height:44px;max-height:150px}#send{background:var(--acc);color:var(--bg);border:none;border-radius:8px;padding:0 1.2rem;font-weight:600;cursor:pointer}#send:hover{opacity:.9}#send:disabled{opacity:.5;cursor:not-allowed}::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}</style></head><body>
<header><h1>🔐 BIOS Cloud Gateway</h1><button id="clear">Очистить</button></header>
<div id="chat"></div>
<div id="input-box"><div class="controls"><label class="toggle"><input type="checkbox" id="search"> 🔍 Поиск в интернете</label></div><div class="wrap"><textarea id="q" placeholder="Введите запрос... (Shift+Enter для переноса)"></textarea><button id="send">Отправить</button></div></div>
<script>const c=document.getElementById('chat'),q=document.getElementById('q'),btn=document.getElementById('send'),clr=document.getElementById('clear'),srch=document.getElementById('search');function add(r,t,m){const d=document.createElement('div');d.className='msg '+r;d.innerHTML='<div class="meta">'+m+'</div><div class="content">'+t+'</div>';c.appendChild(d);c.scrollTop=c.scrollHeight}clr.onclick=()=>c.innerHTML='';async function go(){const v=q.value.trim();if(!v)return;const u=srch.checked;add('user',v,u?'<span>🔍 поиск</span>':'');q.value='';q.style.height='44px';btn.disabled=true;const ld=document.createElement('div');ld.className='msg ai';ld.innerHTML='<div class="content" style="opacity:.6">Генерация...</div>';c.appendChild(ld);c.scrollTop=c.scrollHeight;try{const r=await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:v,use_search:u})});const d=await r.json();c.removeChild(ld);let m='';if(d.search_used)m+='<span>🔍</span>';m+='<span>☁️</span>';m+=d.bios_status==='ok'?'<span style="color:var(--ok)">✅ BIOS</span>':'<span style="color:var(--err)">🔒 BIOS</span>';if(d.reason)m+='<span style="color:var(--err)">⚠️ '+d.reason+'</span>';add('ai',d.response||'[Нет ответа]',m)}catch{c.removeChild(ld);add('ai','Ошибка соединения.','<span style="color:var(--err)">⚠️ Ошибка</span>')}finally{btn.disabled=false;q.focus()}}btn.onclick=go;q.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go()}});q.addEventListener('input',()=>{q.style.height='auto';q.style.height=Math.min(q.scrollHeight,150)+'px'});q.focus();</script></body></html>
